services:
  - type: web
    name: prepsensei-backend
    env: docker
    # Build context is repo root; Dockerfile copies from backend/ explicitly.
    # This matches Render's manual-service default (no rootDir override) so
    # it works whether or not the dashboard is reading render.yaml.
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: VERCEL_URL
        sync: false
      - key: MAX_LLM_CALLS_PER_SESSION
        value: "50"
